spring.application.name=user-service
server.port=8082

spring.datasource.url=jdbc:postgresql://localhost:5432/is_user
spring.datasource.username=postgres
spring.datasource.password=postgres

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
#
#jwt.secret=secretkeysecretkeysecretkey123456
#jwt.expiration=86400000

spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/is-order-processing

keycloak.server-url: http://localhost:8181
keycloak.realm: is-order-processing
keycloak.client-id: admin-cli
keycloak.username: admin
keycloak.password: admin
keycloak.target-client-id: oauth2-pkce-client


spring.cloud.consul.host=localhost
spring.cloud.consul.port=8500
spring.cloud.consul.discovery.enabled=true
spring.cloud.consul.discovery.register=true
spring.cloud.consul.discovery.service-name=${spring.application.name}

frontend-url=http://localhost:3000

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always